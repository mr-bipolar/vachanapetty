name: vachanapetty
description: A new vachanapetty app.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.7+7

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  cupertino_icons: ^1.0.2
  flutter:
    sdk: flutter
  flutter_fortune_wheel: ^1.3.1
  path: any
  sqflite: ^2.3.0
  freezed_annotation: ^3.0.0
  dartz: ^0.10.1
  flutter_bloc: ^9.1.1
  get_it: ^8.0.3
  

dev_dependencies:

  flutter_lints: ^2.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.0.6
  build_runner: ^2.4.15

flutter:

  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/quotes.db

  fonts:
    - family: Dyuthi
      fonts:
        - asset: assets/fonts/dyuthi.ttf
